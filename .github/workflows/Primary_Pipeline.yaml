name: Uptime – Primary Dev Frontend Build and Deployment Pipeline

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  actions: read

env:
  SERVICE_TYPE: frontend
  ENVIRONMENT: primary 


jobs:
  build-and-deploy:
    name: Build and Deployment
    runs-on: ubuntu-latest
    environment: primary
    outputs:
      image_tag: ${{ steps.image_tag.outputs.IMAGE_TAG }}
      deployment_file_path: ${{ steps.image_tag.outputs.DEPLOYMENT_FILE_PATH }}
      repo_name: ${{ steps.image_tag.outputs.REPO_NAME }}

    steps:
      - name: "Self Checkout the Branch"
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Generate Image Tag and Variables
        id: image_tag
        run: |
          # Get current date in ddMMyyyy format
          CURRENT_DATE=$(date +'%d%m%Y')
          SHORT_SHA=$(git rev-parse --short=4 HEAD)
          
          # Use env.ENVIRONMENT instead of vars.Environment
          IMAGE_TAG="${{ vars.APPLICATION_NAME }}-${{ env.ENVIRONMENT }}-${CURRENT_DATE}-v1.0.${SHORT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT

          # Create repository name (lowercase for ACR compatibility)
          REPO_NAME="${{ vars.APPLICATION_NAME }}-${{ env.ENVIRONMENT }}-${{ env.SERVICE_TYPE }}"
          echo "REPO_NAME=${REPO_NAME}" >> $GITHUB_ENV
          echo "REPO_NAME=${REPO_NAME}" >> $GITHUB_OUTPUT

          # Create deployment file path
          DEPLOYMENT_FILE_PATH="primary/deployment.yaml"
          echo "DEPLOYMENT_FILE_PATH=${DEPLOYMENT_FILE_PATH}" >> $GITHUB_ENV
          echo "DEPLOYMENT_FILE_PATH=${DEPLOYMENT_FILE_PATH}" >> $GITHUB_OUTPUT
          
          echo "✅ Generated values:"
          echo "  IMAGE_TAG: ${IMAGE_TAG}"
          echo "  REPO_NAME: ${REPO_NAME}"
          echo "  DEPLOYMENT_FILE_PATH: ${DEPLOYMENT_FILE_PATH}"
    

      - name: "Moving the Docker file"
        run: |
            cp -r .github/workflows/Docker_Files/dev/* .

      - name: "Creating the ENV file with API_Base_URL"
        run: |

              cat <<EOF > ./.env
              REACT_APP_API_BASE_URL= ${{ vars.REACT_APP_API_BASE_URL }}
              EOF

      # - name: "Login to the Azure"
      #   uses: azure/login@v2
      #   with: 
      #     creds: "${{ secrets.AZURE_CREDENTIALS }}"
        
      - name: "Login to Azure Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_SERVER_URL }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: "Docker image creation and push into ACR"
        uses: docker/build-push-action@v5
        with: 
          context: .
          push: true
          tags: |
                ${{ secrets.ACR_SERVER_URL }}/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}
                ${{ secrets.ACR_SERVER_URL }}/${{ env.REPO_NAME }}:latest
          file: ./Dockerfile

  update-deployment-file:
    name: Update Deployment YAML in Repository
    runs-on: ubuntu-latest
    needs: build-and-deploy
    environment: primary
    env:
      IMAGE_TAG: ${{ needs.build-and-deploy.outputs.image_tag }}
      DEPLOYMENT_FILE_PATH: ${{ needs.build-and-deploy.outputs.deployment_file_path }}
      REPO_NAME: ${{ needs.build-and-deploy.outputs.repo_name }}
    if: success()
    steps:
      - name: Checkout repository (with deployment files)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOYMENT_REPO_PAT }}
          repository: ${{ vars.DEPLOYMENT_REPO_NAME }}
          ref: ${{ vars.DEPLOYMENT_BRANCH_NAME }}
          path: repo-to-update
          fetch-depth: 0

      - name: Update image tag in deployment file
        run: |
          cd repo-to-update
          IMAGE_TAG="${{ needs.build-and-deploy.outputs.image_tag }}"
          
          echo "Updating deployment with image tag: ${{ env.IMAGE_TAG }}"
          echo "Deployment file path: ${{ env.DEPLOYMENT_FILE_PATH }}"
          echo "Repository name: ${{ env.REPO_NAME }}"
          
          # Check if file exists
          if [ ! -f "${{ env.DEPLOYMENT_FILE_PATH }}" ]; then
            echo "Error: Deployment file not found at ${{ env.DEPLOYMENT_FILE_PATH }}"
            exit 1
          fi
          
          # Update the image tag in the deployment file
          sed -i "s|${{ secrets.ACR_SERVER_URL }}/${{ env.REPO_NAME }}:[^\"']*|${{ secrets.ACR_SERVER_URL }}/${{ env.REPO_NAME }}:${{ env.IMAGE_TAG }}|g" ${{ env.DEPLOYMENT_FILE_PATH }}
          
          # Show the changes
          echo "Updated deployment.yaml:"
          grep -n "image:" ${{ env.DEPLOYMENT_FILE_PATH }}
          
      - name: Validate YAML syntax
        run: |
          cd repo-to-update
          # Install yamllint if not available
          pip install yamllint --quiet || true
          yamllint ${{ env.DEPLOYMENT_FILE_PATH }} || echo "Warning: YAML linting issues found"
          
      - name: Commit and push changes
        run: |
          cd repo-to-update
          IMAGE_TAG="${{ needs.build-and-deploy.outputs.image_tag }}"
          
          # Configure git
          git config user.email "${{ vars.GIT_USER_EMAIL }}"
          git config user.name "${{ vars.GIT_USER_NAME }}"
          
          # Check if there are changes to commit
          if git diff --quiet ${{ env.DEPLOYMENT_FILE_PATH }}; then
            echo "No changes to commit - image tag might be the same"
            exit 0
          fi
          
          # Show the diff for logging
          echo "Changes to be committed:"
          git diff ${{ env.DEPLOYMENT_FILE_PATH }}
          
          # Commit and push changes
          git add ${{ env.DEPLOYMENT_FILE_PATH }}
          git commit -m "chore(deployment): update image tag to ${IMAGE_TAG}

          - Updated docker image tag to ${IMAGE_TAG}
          - Deployed version: ${{ env.IMAGE_TAG }}
          - Service: ${{ env.SERVICE_TYPE }}
          - Environment: ${{ env.ENVIRONMENT }}
          - Triggered by GitHub Actions run #${{ github.run_number }}
          
          Co-authored-by: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
          
          git push origin HEAD:${{ vars.DEPLOYMENT_BRANCH_NAME }}
          echo "✅ Changes pushed successfully"
          
      - name: Create annotation with updated tag
        if: success()
        run: |
          echo "::notice::Deployment file updated successfully with image tag: ${{ env.IMAGE_TAG }}"
          
      - name: Send notification on failure
        if: failure()
        run: |
          echo "::error::Failed to update deployment file in repository"
          echo "Please check:"
          echo "  - DEPLOYMENT_REPO_PAT secret is valid"
          echo "  - Deployment file path exists: ${{ env.DEPLOYMENT_FILE_PATH }}"
          echo "  - Repository name: ${{ vars.DEPLOYMENT_REPO_NAME }}"
          echo "  - Branch name: ${{ vars.DEPLOYMENT_BRANCH_NAME }}"
          # You can add Slack/Teams webhook notifications here if 
